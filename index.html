<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfluenceFlow CRM</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">IF</div>
        <div>
          <div class="brand-name">InfluenceFlow</div>
          <div class="brand-tag">Agency CRM</div>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-footer">
        <button type="button" class="btn btn-ghost btn-sm" id="export-data">Export data</button>
        <button type="button" class="btn btn-ghost btn-sm" id="import-data">Import data</button>
        <input type="file" id="import-file" accept=".json" hidden />
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle" class="subtitle">Your influencer agency operating system</p>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
